sweep:
  dataset:
  - set_01
  - set_02
  seed:
  - 42
defaults:
  stages:
  - autoencoder
  - curriculum
  - fusion
  - evaluation
  scale: small
  training.loss_fn: focal
  fusion.method: bandit
configs:
  loss_x_curriculum_ce_curriculum:
    training.loss_fn: ce
    fusion.method: weighted_avg
  loss_x_curriculum_ce_normal:
    training.loss_fn: ce
    fusion.method: weighted_avg
    stages:
    - autoencoder
    - normal
    - fusion
    - evaluation
    gat_stage: normal
  loss_x_curriculum_focal_curriculum:
    fusion.method: weighted_avg
  loss_x_curriculum_focal_normal:
    fusion.method: weighted_avg
    stages:
    - autoencoder
    - normal
    - fusion
    - evaluation
    gat_stage: normal
  loss_x_curriculum_weighted_ce_curriculum:
    training.loss_fn: weighted_ce
    fusion.method: weighted_avg
  loss_x_curriculum_weighted_ce_normal:
    training.loss_fn: weighted_ce
    fusion.method: weighted_avg
    stages:
    - autoencoder
    - normal
    - fusion
    - evaluation
    gat_stage: normal
  fusion_bandit: {}
  fusion_dqn:
    fusion.method: dqn
  fusion_mlp:
    fusion.method: mlp
  fusion_weighted_avg:
    fusion.method: weighted_avg
  conv_gatv2: {}
  conv_gatv1:
    vgae.conv_type: gat
    gat.conv_type: gat
  conv_gps:
    vgae.conv_type: gps
    gat.conv_type: gps
  unsup_vgae: {}
  unsup_gae:
    vgae.variational: false
  unsup_dgi:
    model_type: dgi
    stages:
    - autoencoder
    - normal
    - evaluation
    gat_stage: normal
  vgae_only:
    stages:
    - autoencoder
    - evaluation
  gat_only:
    stages:
    - normal
    - evaluation
    gat_stage: normal
