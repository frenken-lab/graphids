# Ablation recipe — declarative experiment spec for Run 004.
# Expander: python -m graphids.orchestrate.expand [--recipe ablation.yaml]
#
# 18 configs covering 6 claims:
#   1. Single-model baselines (2)
#   2. Fusion method (4)
#   3. KD & scale (2)
#   4. Loss x Curriculum factorial (6)
#   5. Conv type (3)
#   6. Unsupervised method (3) — DGI is placeholder pending DGIModule

sweep:
  datasets: [set_01]
  seeds: [42]

defaults:
  stages: [autoencoder, curriculum, fusion]
  scale: small
  conv_type: gatv2
  loss_fn: focal
  fusion_method: bandit
  variational: true

configs:
  # --- Loss x Curriculum factorial (claim 4) ---
  ce_normal:
    loss_fn: ce
    fusion_method: weighted_avg
    stages: [autoencoder, normal, fusion]
  ce_curriculum:
    loss_fn: ce
    fusion_method: weighted_avg
  focal_normal:
    fusion_method: weighted_avg
    stages: [autoencoder, normal, fusion]
  focal_curriculum:
    fusion_method: weighted_avg
  wce_normal:
    loss_fn: weighted_ce
    fusion_method: weighted_avg
    stages: [autoencoder, normal, fusion]
  wce_curriculum:
    loss_fn: weighted_ce
    fusion_method: weighted_avg

  # --- Fusion method (claim 2) ---
  fusion_bandit: {}
  fusion_dqn:
    fusion_method: dqn
  fusion_mlp:
    fusion_method: mlp
  fusion_weighted_avg:
    fusion_method: weighted_avg

  # --- Conv type (claim 5) ---
  conv_gatv2: {}
  conv_gatv1:
    conv_type: gat
  conv_gps:
    conv_type: gps

  # --- Unsupervised method (claim 6) ---
  unsup_vgae: {}
  unsup_gae:
    variational: false
  unsup_dgi:
    model_type: dgi
    stages: [autoencoder, normal, fusion]

  # --- Single-model baselines (claim 1) ---
  vgae_only:
    stages: [autoencoder]
  gat_only:
    stages: [curriculum]

  # --- KD & scale (claim 3) ---
  large_reference:
    scale: large
  kd_student:
    auxiliaries:
      - type: kd
        alpha: 0.7
        teacher_scale: large
