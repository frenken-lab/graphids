recipe:
  name: ablation
  description: Focused factorial and method ablations
sweeps:
  - model_family: gat
    stage: normal
    scale: [small, large]
    model_overrides:
      init_args:
        loss_fn: [ce, focal, weighted_ce]
  - model_family: gat
    stage: curriculum
    scale: [small, large]
    model_overrides:
      init_args:
        loss_fn: [ce, focal, weighted_ce]
  - model_family: fusion
    stage: fusion
    scale: [small, large]
    fusion_method: [bandit, dqn, mlp, weighted_avg]
