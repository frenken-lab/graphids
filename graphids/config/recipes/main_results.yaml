# Main results recipe — large teacher + small KD student across all datasets.
# Pipeline: VGAE → GATv2 (curriculum) → Bandit fusion.

sweep:
  datasets: [hcrl_ch, hcrl_sa, set_01, set_02, set_03, set_04]
  seeds: [42]

defaults:
  stages: [autoencoder, curriculum, fusion]
  scale: small
  conv_type: gatv2
  loss_fn: focal
  fusion_method: bandit
  variational: true

configs:
  # Large teacher — full-size models, no KD
  large_teacher:
    scale: large

  # Small student — distilled from large teacher
  small_kd:
    auxiliaries:
      - type: kd
        alpha: 0.7
        teacher_scale: large
