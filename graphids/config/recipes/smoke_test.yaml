recipe:
  name: smoke_test
  description: Fast smoke test — hcrl_sa, 2 epochs, gpudebug
seeds: [42]
selection:
  datasets: [hcrl_sa]
  model_families: [vgae, gat, fusion]
  scales: [small]
  stages:
    vgae: [autoencoder]
    gat: [curriculum]
    fusion: [fusion]
  fusion_methods: [bandit]
# Keys are relative to the trainer namespace (no "trainer." prefix needed)
trainer_overrides:
  max_epochs: 2
resource_overrides:
  time: "0:15:00"
  partition: gpudebug
