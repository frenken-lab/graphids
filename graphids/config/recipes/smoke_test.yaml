recipe:
  name: smoke_test
  description: Medium-fidelity smoke — all stages, all fusions, 50 epochs, hcrl_sa
seeds: [99]
selection:
  datasets: [hcrl_sa]
  model_families: [vgae, gat, fusion]
  scales: [small]
  stages:
    vgae: [autoencoder]
    gat: [normal, curriculum]
    fusion: [fusion]
  fusion_methods: [bandit, dqn, mlp, weighted_avg]
# 50 epochs: enough for ModelCheckpoint to fire, curriculum phase 0→1,
# EarlyStopping metric tracking, RL exploration to start.
# Curriculum data.init_args.max_epochs auto-synced by ConfigResolver.
trainer_overrides:
  trainer.max_epochs: 50
resource_overrides:
  time: "1:00:00"
  partition: gpudebug
