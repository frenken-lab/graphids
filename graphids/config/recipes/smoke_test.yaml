recipe:
  name: smoke_test
  description: Fast smoke test — hcrl_sa, 2 epochs, gpudebug
seeds: [99]
selection:
  datasets: [hcrl_sa]
  model_families: [vgae, gat, fusion]
  scales: [small]
  stages:
    vgae: [autoencoder]
    gat: [curriculum]
    fusion: [fusion]
  fusion_methods: [bandit]
# Fully-qualified dotted paths — used as --key=val CLI args
# and applied to merged YAML for cross-field validation.
# Curriculum data.init_args.max_epochs is auto-synced by ConfigResolver.
trainer_overrides:
  trainer.max_epochs: 10
resource_overrides:
  time: "0:15:00"
  partition: gpudebug
