# Large-scale VGAE architecture (sweep-optimized).
# Layer on top of stages/autoencoder.yaml:
#   python -m graphids fit --config .../stages/autoencoder.yaml --config .../overlays/large_vgae.yaml
model:
  init_args:
    hidden_dims: [480, 240, 64]
    latent_dim: 64
    heads: 4
    embedding_dim: 32
    dropout: 0.15
    proj_dim: 48
    scale: large
