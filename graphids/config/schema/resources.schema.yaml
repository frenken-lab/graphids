$schema: "https://json-schema.org/draft/2020-12/schema"
title: KD-GAT Resource Profile
type: object
additionalProperties: false
required: [resources]
properties:
  resources:
    type: object
    additionalProperties: true
    required: [family, by_scale]
    properties:
      family:
        type: string
      by_scale:
        type: object
        required: [small, large]
        properties:
          small:
            type: object
          large:
            type: object
