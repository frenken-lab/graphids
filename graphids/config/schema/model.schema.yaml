$schema: "https://json-schema.org/draft/2020-12/schema"
title: KD-GAT Model Config
type: object
additionalProperties: false
required: [model]
properties:
  model:
    type: object
    additionalProperties: false
    required: [family, class_path, init_args]
    properties:
      family:
        type: string
        enum: [vgae, dgi, gat, temporal, fusion]
      class_path:
        type: [string, 'null']
      scale:
        type: string
        enum: [small, large]
      init_args:
        type: object
