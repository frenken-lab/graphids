resources:
  family: vgae
  # VGAE is collation-bound (cg_ratio >> 1). Sizing chain projects ~16 workers.
  # cpus=20 leaves headroom for main process + data staging.
  by_scale:
    small:
      autoencoder: {mode: gpu_train, time: "4:00:00", cpus: 20, workers: 18}
      curriculum:  {mode: gpu_train, time: "2:00:00", cpus: 20, workers: 18}
    large:
      autoencoder: {mode: gpu_train, time: "4:00:00", cpus: 20, workers: 18}
      curriculum:  {mode: gpu_train, time: "4:00:00", cpus: 20, workers: 18}
