resources:
  family: gat
  # GAT is compute-bound (cg_ratio ≈ 0.21 at W=6). Extra workers are idle.
  # 4 workers sufficient — GPU is the bottleneck, not collation.
  by_scale:
    small:
      normal:     {mode: gpu_train, time: "4:30:00", cpus: 6, workers: 4}
      curriculum: {mode: gpu_train, time: "4:30:00", cpus: 6, workers: 4}
    large:
      normal:     {mode: gpu_train, time: "5:00:00", cpus: 6, workers: 4}
      curriculum: {mode: gpu_train, time: "5:00:00", cpus: 6, workers: 4}
