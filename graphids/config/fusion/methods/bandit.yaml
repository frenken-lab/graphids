fusion:
  method: bandit
  training_mode: offline_rl
model:
  class_path: BanditFusionModule
  init_args:
    lr: 0.001
    decision_threshold: 0.5
    reward_kwargs: {}
    ucb_alpha: 1.0
    lambda_reg: 1.0
    backbone_lr: 0.001
    backbone_retrain_freq: 50
    backbone_epochs: 5
    buffer_size: 100000
