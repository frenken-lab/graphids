training.lr:
  type: loguniform
  low: 1.0e-4
  high: 1.0e-2
training.weight_decay:
  type: loguniform
  low: 1.0e-6
  high: 1.0e-3
gat.hidden:
  type: choice
  values: [32, 48, 64, 96]
gat.layers:
  type: choice
  values: [2, 3, 4]
gat.heads:
  type: choice
  values: [4, 8]
gat.dropout:
  type: uniform
  low: 0.1
  high: 0.4
gat.embedding_dim:
  type: choice
  values: [8, 16, 32]
gat.fc_layers:
  type: choice
  values: [2, 3, 4]
gat.proj_dim:
  type: choice
  values: [32, 48, 64]
