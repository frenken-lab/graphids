training.lr:
  type: loguniform
  low: 1.0e-4
  high: 1.0e-2
training.weight_decay:
  type: loguniform
  low: 1.0e-6
  high: 1.0e-3
vgae.latent_dim:
  type: choice
  values: [16, 32, 48, 64]
vgae.dropout:
  type: uniform
  low: 0.05
  high: 0.4
vgae.heads:
  type: choice
  values: [1, 2, 4, 8]
vgae.embedding_dim:
  type: choice
  values: [8, 16, 32]
vgae.proj_dim:
  type: choice
  values: [32, 48, 64]
