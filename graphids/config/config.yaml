# config.yaml — Hydra root config with ALL defaults inline (no config groups).
# Model-specific overrides are in models.yaml, merged by Python after Hydra compose.

# --- Identity ---
dataset: hcrl_sa
model_type: vgae
scale: large
stage: autoencoder
seed: 42

# --- Infrastructure ---
lake_root: ${oc.env:KD_GAT_LAKE_ROOT,experimentruns}
device: cuda
num_workers: 2
production: ${oc.env:KD_GAT_PRODUCTION,false}

# --- VGAE architecture ---
vgae:
  hidden_dims: [480, 240, 48]
  latent_dim: 48
  heads: 4
  embedding_dim: 32
  dropout: 0.15
  conv_type: gat
  edge_dim: 11
  proj_dim: 0
  canid_weight: 0.1
  nbr_weight: 0.05
  kl_weight: 0.01

# --- GAT architecture ---
gat:
  hidden: 48
  layers: 3
  heads: 8
  dropout: 0.2
  embedding_dim: 16
  fc_layers: 3
  conv_type: gat
  edge_dim: 11
  pool_aggrs: [mean]
  proj_dim: 0

# --- DQN architecture ---
dqn:
  hidden: 576
  layers: 3
  gamma: 0.99
  epsilon: 0.1
  epsilon_decay: 0.995
  min_epsilon: 0.01
  buffer_size: 100000
  batch_size: 128
  target_update: 100
  weight_decay: 0.00001
  scheduler_patience: 1000
  max_patience: 5000
  vgae_error_weights: [0.4, 0.35, 0.25]

# --- Training ---
training:
  lr: 0.003
  max_epochs: 300
  batch_size: 4096
  patience: 100
  weight_decay: 0.0001
  gradient_clip: 1.0
  precision: "16-mixed"
  safety_factor: 0.5
  gradient_checkpointing: true
  use_teacher_cache: true
  clear_cache_every_n: 100
  offload_teacher_to_cpu: false
  accumulate_grad_batches: 1
  save_top_k: 1
  monitor_metric: val_loss
  monitor_mode: min
  log_every_n_steps: 50
  test_every_n_epochs: 5
  deterministic: false
  cudnn_benchmark: true
  compile_model: false
  use_scheduler: false
  scheduler_type: cosine
  scheduler_t_max: -1
  scheduler_step_size: 50
  scheduler_gamma: 0.1
  scheduler: null
  curriculum_start_ratio: 1.0
  curriculum_end_ratio: 10.0
  difficulty_percentile: 75.0
  use_vgae_mining: true
  difficulty_cache_update: 10
  curriculum_memory_multiplier: 1.0
  log_teacher_student_comparison: true
  dynamic_batching: true

# --- Fusion ---
fusion:
  method: dqn
  episodes: 500
  max_samples: 150000
  max_val_samples: 30000
  episode_sample_size: 20000
  training_step_interval: 32
  gpu_training_steps: 16
  lr: 0.001
  alpha_steps: 21
  mlp_hidden_dims: [64, 32]
  mlp_max_epochs: 100

# --- Temporal ---
temporal:
  enabled: false
  temporal_window: 8
  temporal_stride: 1
  temporal_hidden: 64
  temporal_heads: 4
  temporal_layers: 2
  freeze_spatial: true
  spatial_lr_factor: 0.1

# --- Auxiliary (default: none) ---
auxiliaries: []

# --- Derived paths ---
_tier: dev/${oc.env:USER,unknown}
_output_base: ${lake_root}/${_tier}/${dataset}

checkpoints:
  vgae: ${_output_base}/vgae_${scale}_autoencoder/seed_${seed}/best_model.pt
  gat: ${_output_base}/gat_${scale}_curriculum/seed_${seed}/best_model.pt
  dqn: ${_output_base}/dqn_${scale}_fusion/seed_${seed}/best_model.pt
  temporal: ${_output_base}/gat_${scale}_temporal/seed_${seed}/best_model.pt

callbacks:
  checkpoint:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: "."
    filename: best_model
    monitor: ${training.monitor_metric}
    mode: ${training.monitor_mode}
    save_top_k: ${training.save_top_k}
    save_on_train_epoch_end: false
  early_stopping:
    _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: ${training.monitor_metric}
    patience: ${training.patience}
    mode: ${training.monitor_mode}
    check_on_train_epoch_end: false
  device_stats:
    _target_: pytorch_lightning.callbacks.DeviceStatsMonitor
    cpu_stats: false

hydra:
  job:
    chdir: true
  output_subdir: null
  run:
    dir: ${_output_base}/${model_type}_${scale}_${stage}/seed_${seed}
