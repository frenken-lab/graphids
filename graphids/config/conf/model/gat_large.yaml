# @package _global_
# GAT large (teacher)
# JK cat → fc_input_dim = hidden * heads * layers = 48 * 8 * 3 = 1152
# fc_layers: 1 means just the output projection (1152 → 2), no hidden FC.
model_type: gat
scale: large

gat:
  fc_layers: 1
  conv_type: "gatv2"
  proj_dim: 48
training:
  batch_size: 8192
  safety_factor: 0.85
