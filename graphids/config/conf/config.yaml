defaults:
  - model: vgae_large
  - auxiliary: none
  - dataset: hcrl_sa
  - _self_

stage: autoencoder
seed: 42

# --- Infrastructure (env vars via oc.env with defaults) ---
lake_root: ${oc.env:KD_GAT_LAKE_ROOT,experimentruns}
device: cuda
num_workers: 2
mp_start_method: spawn
run_test: true
production: ${oc.env:KD_GAT_PRODUCTION,false}

# --- Pipeline DAG defaults (from pipeline.yaml topology) ---
stages:
  - autoencoder
  - curriculum
  - fusion
  - evaluation

variants:
  - name: large
    scale: large
    auxiliaries: none
    needs_teacher: false
    stages: [autoencoder, curriculum, fusion, evaluation]
  - name: small_kd
    scale: small
    auxiliaries: kd_standard
    needs_teacher: true
    stages: [autoencoder, curriculum, fusion, evaluation]
  - name: small_nokd
    scale: small
    auxiliaries: none
    needs_teacher: false
    stages: [autoencoder, curriculum, fusion, evaluation]

# Add after the infrastructure section:
_tier: dev/${oc.env:USER,unknown}
_output_base: ${lake_root}/${_tier}/${dataset}

checkpoints:
  vgae: ${_output_base}/vgae_${scale}_autoencoder/seed_${seed}/best_model.pt
  gat: ${_output_base}/gat_${scale}_curriculum/seed_${seed}/best_model.pt
  dqn: ${_output_base}/dqn_${scale}_fusion/seed_${seed}/best_model.pt
  temporal: ${_output_base}/gat_${scale}_temporal/seed_${seed}/best_model.pt

# Change hydra section:
hydra:
  job:
    chdir: true # Hydra cd's to run.dir — Lightning writes to cwd
  output_subdir: null
  run:
    dir: ${_output_base}/${model_type}_${scale}_${stage}/seed_${seed}
