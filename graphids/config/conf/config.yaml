defaults:
  - model: vgae_large
  - auxiliary: none
  - dataset: hcrl_sa
  - _self_

stage: autoencoder
seed: 42

# --- Infrastructure (env vars via oc.env with defaults) ---
lake_root: ${oc.env:KD_GAT_LAKE_ROOT,experimentruns}
device: cuda
num_workers: 2
mp_start_method: spawn
run_test: true
production: ${oc.env:KD_GAT_PRODUCTION,false}

# --- Pipeline DAG defaults (from pipeline.yaml topology) ---
stages:
  - autoencoder
  - curriculum
  - fusion
  - evaluation

variants:
  - name: large
    scale: large
    auxiliaries: none
    needs_teacher: false
    stages: [autoencoder, curriculum, fusion, evaluation]
  - name: small_kd
    scale: small
    auxiliaries: kd_standard
    needs_teacher: true
    stages: [autoencoder, curriculum, fusion, evaluation]
  - name: small_nokd
    scale: small
    auxiliaries: none
    needs_teacher: false
    stages: [autoencoder, curriculum, fusion, evaluation]

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .
