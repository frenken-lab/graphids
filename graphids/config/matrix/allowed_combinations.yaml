allow:
  - model_family: vgae
    stages: [autoencoder, curriculum]
    scales: [small, large]
    datasets: [hcrl_ch, hcrl_sa, set_01, set_02, set_03, set_04]
  - model_family: dgi
    stages: [autoencoder]
    scales: [small, large]
    datasets: [hcrl_ch, hcrl_sa, set_01, set_02, set_03, set_04]
  - model_family: gat
    stages: [normal, curriculum]
    scales: [small, large]
    datasets: [hcrl_ch, hcrl_sa, set_01, set_02, set_03, set_04]
  - model_family: temporal
    stages: [temporal]
    scales: [small, large]
    datasets: [hcrl_ch, hcrl_sa, set_01, set_02, set_03, set_04]
  - model_family: fusion
    stages: [fusion]
    scales: [small, large]
    fusion_methods: [bandit, dqn, mlp, weighted_avg]
    datasets: [hcrl_ch, hcrl_sa, set_01, set_02, set_03, set_04]

deny:
  - model_family: fusion
    fusion_methods: []
    reason: fusion requires explicit fusion_method
