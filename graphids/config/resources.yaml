# Resource profiles — single source of truth for SLURM allocation + DataLoader config.
#
# RAM formula: 15G base + num_workers × dataset_size + 4G overhead
# (RSS inflated by shared mmap pages — actual PSS is lower)
#
# GPU util model: min(1.0, num_workers × T_gpu / T_collate)
#   T_collate ≈ 25ms warm cache (persistent_workers epoch 2+)
#   T_gpu ≈ 10ms (VGAE) / 25ms (GAT)
#
# Profiles derived from: sacct history March 2026, GPU profiling Run 003,
# plans/memory-profiling/performance-analysis.md
#
# Cluster-agnostic: profiles use `mode` (from pipeline.yaml) instead of
# hardcoded partition/gres. Resolved at submit time via `clusters` mapping
# + hostname detection (or KD_GAT_CLUSTER env var override).

clusters:
  pitzer:
    gpu_train: { partition: gpu, gres: "gpu:1" }
    gpu_eval: { partition: gpu, gres: "gpu:1" }
    cpu_preprocess: { partition: cpu, gres: "" }
  ascend:
    gpu_train: { partition: batch, gres: "gpu:a100:1" }
    gpu_eval: { partition: batch, gres: "gpu:a100:1" }
    cpu_preprocess: { partition: batch, gres: "" }
  cardinal:
    gpu_train: { partition: batch, gres: "gpu:h100:1" }
    gpu_eval: { partition: batch, gres: "gpu:h100:1" }
    cpu_preprocess: { partition: batch, gres: "" }

