# Resource profiles for SLURM orchestration.
# Structure: resource_profiles[model_type][scale][stage] -> {gpus, cpus, memory_gb, walltime_min, partition}

resource_profiles:
  preprocess:
    "":
      preprocess:
        partition: cpu
        gpus: 0
        cpus: 8
        memory_gb: 32
        walltime_min: 60
  vgae:
    large:
      autoencoder:
        partition: gpu
        gpus: 1
        cpus: 4
        memory_gb: 20
        walltime_min: 180
    small:
      autoencoder:
        partition: gpu
        gpus: 1
        cpus: 4
        memory_gb: 16
        walltime_min: 120
  gat:
    large:
      curriculum:
        partition: gpu
        gpus: 1
        cpus: 4
        memory_gb: 16
        walltime_min: 180
    small:
      curriculum:
        partition: gpu
        gpus: 1
        cpus: 4
        memory_gb: 12
        walltime_min: 120
  dqn:
    large:
      fusion:
        partition: cpu
        gpus: 0
        cpus: 4
        memory_gb: 16
        walltime_min: 30
    small:
      fusion:
        partition: cpu
        gpus: 0
        cpus: 4
        memory_gb: 12
        walltime_min: 30
  eval:
    large:
      evaluation:
        partition: cpu
        gpus: 0
        cpus: 4
        memory_gb: 16
        walltime_min: 30
    small:
      evaluation:
        partition: cpu
        gpus: 0
        cpus: 4
        memory_gb: 12
        walltime_min: 30
