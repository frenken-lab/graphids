# Resource profiles for SLURM orchestration.
# 3 profiles mapped by pipeline.yaml `mode` field. No per-model/scale lookup.

resource_profiles:
  gpu_train:
    partition: gpu
    gpus: 1
    cpus: 6
    memory_gb: 32
    walltime_min: 240
  gpu_eval:
    partition: gpu
    gpus: 1
    cpus: 6
    memory_gb: 32
    walltime_min: 120
  cpu_preprocess:
    partition: cpu
    gpus: 0
    cpus: 8
    memory_gb: 32
    walltime_min: 90
