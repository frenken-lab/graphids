seed_everything: 42
trainer:
  accelerator: auto
  devices: auto
  precision: 16-mixed
  max_epochs: 300
  gradient_clip_val: 1.0
  log_every_n_steps: 50
  logger:
    - class_path: pytorch_lightning.loggers.WandbLogger
      init_args:
        project: kd-gat
        log_model: false
    - class_path: pytorch_lightning.loggers.CSVLogger
      init_args:
        save_dir: .  # patched to default_root_dir by cli.py
  callbacks:
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args: {monitor: val_loss, mode: min, save_top_k: 1, save_last: true, filename: "best_model"}
    - class_path: pytorch_lightning.callbacks.EarlyStopping
      init_args: {monitor: val_loss, patience: 100, mode: min}
    - class_path: pytorch_lightning.callbacks.DeviceStatsMonitor

