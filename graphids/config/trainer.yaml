seed_everything: 42
trainer:
  accelerator: auto
  devices: auto
  precision: 16-mixed
  max_epochs: 300
  gradient_clip_val: 1.0
  log_every_n_steps: 50
  logger: false
  callbacks:
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args: {monitor: val_loss, mode: min, save_top_k: 1, filename: "best_model"}
    - class_path: pytorch_lightning.callbacks.EarlyStopping
      init_args: {monitor: val_loss, patience: 100, mode: min}
    - class_path: graphids.core.preprocessing.curriculum.CurriculumEpochCallback

