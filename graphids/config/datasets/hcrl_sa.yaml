name: hcrl_sa
domain: automotive
protocol: CAN
source: "HCRL CAN Bus Dataset — Scenario Anomaly variant (Korea University)"
csv_dir: "data/automotive/hcrl_sa"
csv_columns:
  timestamp: float64
  arbitration_id: str
  data_field: str
  attack: int
train_subdir: "train_01_attack_free"
train_attack_subdir: "train_02_with_attacks"
test_subdirs:
  - "test_01_known_vehicle_known_attack"
  - "test_02_unknown_vehicle_known_attack"
  - "test_03_known_vehicle_unknown_attack"
  - "test_04_unknown_vehicle_unknown_attack"
attack_types: [mixed]
