# GAT supervised, no curriculum. Standalone baseline.
# Use with: --config configs/base.yaml --config configs/normal.yaml
model:
  class_path: graphids.core.models.gat.GATModule
  init_args:
    gat: {fc_layers: 1, proj_dim: 48}
    training: {compile_model: true}
data:
  class_path: graphids.core.preprocessing.datamodule.CANBusDataModule
  init_args: {batch_size: 8192, num_workers: 2}
