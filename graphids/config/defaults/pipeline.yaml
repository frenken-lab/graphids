# pipeline.yaml — Pipeline topology (single source of truth for DAG structure).
#
# Defines model types, scales, stages, and their DAG dependencies.
# identity_keys per stage declare which manifest config keys affect that
# stage's output (used by the orchestrator for stage deduplication).
#
# To add a new model type:  add to models: + create models/{type}/*.yaml + register nn.Module
# To add a new scale:       add to scales: + create models/{type}/{scale}.yaml + add resource profile
# To add a new stage:       add to stages: with depends_on + identity_keys + register stage function + add resource profile

# --- Model types (keys must match models/{type}/ directories) ---
models:
  vgae:
    learning_type: unsupervised
    architecture: VGAEArchitecture
  gat:
    learning_type: supervised
    architecture: GATArchitecture
  dqn:
    learning_type: rl_fusion
    architecture: DQNArchitecture
  dgi:
    learning_type: unsupervised
    architecture: DGIArchitecture

# --- Valid scales (must have corresponding models/{type}/{scale}.yaml) ---
scales:
  - large
  - small

# --- Stage definitions + DAG dependencies ---
# Each stage maps to a model type and training mode.
# depends_on is a list of {model, stage} pairs (empty = root node).
# run_id() overrides model to "eval" for the evaluation stage.
stages:
  preprocess:
    learning_type: preprocessing
    model: preprocess
    mode: cpu_preprocess
    depends_on: []
    identity_keys: []

  autoencoder:
    learning_type: unsupervised
    model: vgae
    mode: gpu_train
    depends_on:
      - { model: preprocess, stage: preprocess }
    identity_keys: [scale, vgae.conv_type, vgae.variational]

  curriculum:
    learning_type: supervised
    model: gat
    mode: gpu_train
    depends_on:
      - { model: vgae, stage: autoencoder }
    identity_keys: [scale, gat.conv_type, training.loss_fn]

  normal:
    learning_type: supervised
    model: gat
    mode: gpu_train
    depends_on:
      - { model: preprocess, stage: preprocess }
    identity_keys: [scale, gat.conv_type, training.loss_fn]

  fusion:
    learning_type: rl_fusion
    model: dqn
    mode: gpu_train
    depends_on:
      - { model: vgae, stage: autoencoder }
      - { model: gat, stage: curriculum }
    identity_keys: [scale, gat_stage, training.loss_fn, fusion.method]

  evaluation:
    learning_type: evaluation
    model: eval
    mode: gpu_eval
    depends_on:
      - { model: dqn, stage: fusion }
    identity_keys: [scale, gat_stage, training.loss_fn, fusion.method]

  temporal:
    learning_type: temporal
    model: gat
    mode: gpu_train
    depends_on:
      - { model: gat, stage: curriculum }
    identity_keys: [scale, gat_stage, training.loss_fn]

# --- Default stage list (when manifest omits stages) ---
default_stages: [autoencoder, curriculum, fusion, evaluation]
