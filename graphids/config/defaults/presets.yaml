# Model × scale presets. Keys are {model_type}_{scale}.
# Overrides on top of dataclass defaults in schema.py.

# --- Shared anchors ---

_unsupervised_large: &unsupervised_large
  conv_type: gatv2
  proj_dim: 48

_unsupervised_small: &unsupervised_small
  hidden_dims: [80, 40, 16]
  latent_dim: 16
  heads: 1
  embedding_dim: 4
  dropout: 0.1
  conv_type: gatv2
  proj_dim: 32

_train_large: &train_large
  lr: 0.002
  compile_model: true

_train_small: &train_small
  lr: 0.002
  compile_model: true

# --- Presets ---

vgae_large:
  vgae: *unsupervised_large
  training: *train_large

vgae_small:
  vgae: *unsupervised_small
  training: *train_small

gat_large:
  gat:
    fc_layers: 1
    conv_type: gatv2
    proj_dim: 48
  training:
    batch_size: 8192
    compile_model: true

gat_small:
  gat:
    hidden: 24
    layers: 2
    heads: 4
    embedding_dim: 8
    fc_layers: 2
    dropout: 0.1
    conv_type: gatv2
    proj_dim: 32
  training:
    lr: 0.001
    patience: 50
    compile_model: true

dgi_large:
  dgi: *unsupervised_large
  training: *train_large

dgi_small:
  dgi: *unsupervised_small
  training: *train_small

dqn_large: {}

dqn_small:
  dqn:
    hidden: 160
    layers: 2
    buffer_size: 50000
    batch_size: 64
    target_update: 50
