# Schema + defaults for all config sections.
# Single source of truth. Python dataclasses are generated from this at import time.
# Stage YAMLs override individual fields.

vgae:
  hidden_dims: { type: "list[int]", default: [480, 240, 48] }
  latent_dim: { type: int, default: 48 }
  heads: { type: int, default: 4 }
  embedding_dim: { type: int, default: 32 }
  dropout: { type: float, default: 0.15 }
  conv_type: { type: str, default: gatv2 }
  edge_dim: { type: int, default: 11 }
  proj_dim: { type: int, default: 0 }
  variational: { type: bool, default: true }
  mask_ratio: { type: float, default: 0.3 }
  canid_weight: { type: float, default: 0.1 }
  nbr_weight: { type: float, default: 0.05 }
  kl_weight: { type: float, default: 0.01 }
  k_neg: { type: int, default: 32 }

gat:
  hidden: { type: int, default: 48 }
  layers: { type: int, default: 3 }
  heads: { type: int, default: 8 }
  dropout: { type: float, default: 0.2 }
  embedding_dim: { type: int, default: 16 }
  fc_layers: { type: int, default: 3 }
  conv_type: { type: str, default: gatv2 }
  edge_dim: { type: int, default: 11 }
  pool_aggrs: { type: "list[str]", default: [mean] }
  proj_dim: { type: int, default: 0 }

dgi:
  hidden_dims: { type: "list[int]", default: [480, 240, 48] }
  latent_dim: { type: int, default: 48 }
  heads: { type: int, default: 4 }
  embedding_dim: { type: int, default: 32 }
  dropout: { type: float, default: 0.15 }
  conv_type: { type: str, default: gatv2 }
  edge_dim: { type: int, default: 11 }
  proj_dim: { type: int, default: 0 }

training:
  lr: { type: float, default: 0.003 }
  batch_size: { type: int, default: 8192 }
  patience: { type: int, default: 100 }
  weight_decay: { type: float, default: 0.0001 }
  gradient_clip: { type: float, default: 1.0 }
  precision: { type: str, default: 16-mixed }
  gradient_checkpointing: { type: bool, default: true }
  use_teacher_cache: { type: bool, default: true }
  clear_cache_every_n: { type: int, default: 100 }
  offload_teacher_to_cpu: { type: bool, default: false }
  accumulate_grad_batches: { type: int, default: 1 }
  save_top_k: { type: int, default: 1 }
  monitor_metric: { type: str, default: val_loss }
  monitor_mode: { type: str, default: min }
  log_every_n_steps: { type: int, default: 50 }
  test_every_n_epochs: { type: int, default: 5 }
  deterministic: { type: bool, default: false }
  cudnn_benchmark: { type: bool, default: true }
  compile_model: { type: bool, default: false }
  curriculum_start_ratio: { type: float, default: 1.0 }
  curriculum_end_ratio: { type: float, default: 10.0 }
  difficulty_percentile: { type: float, default: 75.0 }
  use_vgae_mining: { type: bool, default: true }
  difficulty_cache_update: { type: int, default: 10 }
  curriculum_memory_multiplier: { type: float, default: 1.0 }
  log_teacher_student_comparison: { type: bool, default: true }
  dynamic_batching: { type: bool, default: true }
  loss_fn: { type: str, default: ce }
  loss_weight: { type: float, default: 10.0 }
  focal_gamma: { type: float, default: 2.0 }
  swa_enabled: { type: bool, default: true }
  swa_lrs: { type: float, default: 0.001 }
  swa_epoch_start: { type: float, default: 0.75 }
  device_stats: { type: bool, default: true }
  lr_monitor: { type: bool, default: true }
  lr_monitor_interval: { type: str, default: step }

dqn:
  hidden: { type: int, default: 576 }
  layers: { type: int, default: 3 }
  gamma: { type: float, default: 0.99 }
  epsilon: { type: float, default: 0.1 }
  epsilon_decay: { type: float, default: 0.995 }
  min_epsilon: { type: float, default: 0.01 }
  buffer_size: { type: int, default: 100000 }
  batch_size: { type: int, default: 128 }
  target_update: { type: int, default: 100 }
  weight_decay: { type: float, default: 0.00001 }
  scheduler_patience: { type: int, default: 1000 }
  max_patience: { type: int, default: 5000 }
  vgae_error_weights: { type: "list[float]", default: [0.4, 0.35, 0.25] }
  reward_correct: { type: float, default: 3.0 }
  reward_incorrect: { type: float, default: -3.0 }
  confidence_weight: { type: float, default: 0.5 }
  combined_conf_weight: { type: float, default: 0.3 }
  disagreement_penalty: { type: float, default: -1.0 }
  overconf_penalty: { type: float, default: -1.5 }
  balance_weight: { type: float, default: 0.3 }

bandit:
  ucb_alpha: { type: float, default: 1.0 }
  lambda_reg: { type: float, default: 1.0 }
  backbone_retrain_freq: { type: int, default: 50 }
  backbone_lr: { type: float, default: 0.001 }
  backbone_epochs: { type: int, default: 5 }
  hidden: { type: int, default: 576 }
  layers: { type: int, default: 3 }
  buffer_size: { type: int, default: 100000 }
  batch_size: { type: int, default: 128 }

fusion:
  method: { type: str, default: bandit }
  episodes: { type: int, default: 500 }
  max_samples: { type: int, default: 150000 }
  max_val_samples: { type: int, default: 30000 }
  episode_sample_size: { type: int, default: 20000 }
  training_step_interval: { type: int, default: 32 }
  gpu_training_steps: { type: int, default: 16 }
  lr: { type: float, default: 0.001 }
  alpha_steps: { type: int, default: 21 }
  mlp_hidden_dims: { type: "list[int]", default: [64, 32] }
  mlp_max_epochs: { type: int, default: 100 }
  decision_threshold: { type: float, default: 0.5 }

evaluation:
  batch_size: { type: int, default: 256 }
  attention_sample_limit: { type: int, default: 50 }
  cka_max_samples: { type: int, default: 500 }
  loss_landscape: { type: bool, default: false }
  landscape_resolution: { type: int, default: 51 }
  landscape_scale: { type: float, default: 1.0 }

temporal:
  enabled: { type: bool, default: false }
  temporal_window: { type: int, default: 8 }
  temporal_stride: { type: int, default: 1 }
  temporal_hidden: { type: int, default: 64 }
  temporal_heads: { type: int, default: 4 }
  temporal_layers: { type: int, default: 2 }
  freeze_spatial: { type: bool, default: true }
  spatial_lr_factor: { type: float, default: 0.1 }
  train_split: { type: float, default: 0.8 }
  batch_size: { type: int, default: 0 }

preprocessing:
  window_size: { type: int, default: 100 }
  stride: { type: int, default: 100 }
  train_val_split: { type: float, default: 0.8 }
