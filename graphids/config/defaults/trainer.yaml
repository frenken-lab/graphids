trainer:
  accelerator: auto
  devices: auto
  precision: 16-mixed
  max_epochs: 3  # TEMPORARY: validation run. Revert to 300 before ablation.
  gradient_clip_val: 1.0
  log_every_n_steps: 50
checkpoint:
  monitor: val_loss
  mode: min
  save_top_k: 1
  save_last: true
  filename: best_model
early_stopping:
  monitor: val_loss
  mode: min
  patience: 100
