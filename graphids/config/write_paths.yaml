# Where every component writes at runtime.
# Loaded by config/__init__.py — single source of truth for all write paths.
#
# Env var overrides (set in .env):
#   KD_GAT_LAKE_ROOT  → lake_root  (default: "experimentruns")
#   KD_GAT_SLURM_LOG_DIR → slurm.log_dir (default: constants.yaml)
#   WANDB_DIR         → wandb.dir  (set in _preamble.sh)
#   DAGSTER_HOME      → dagster.home (set in dagster-ui.sh / __main__.py)

# --- Run directory template ---
# All Lightning outputs land under this path, set via --trainer.default_root_dir
# Interpolated by run_dir() in config/__init__.py
run_dir: "{lake_root}/dev/{user}/{dataset}/{model}_{scale}_{stage}{identity}{kd_tag}/seed_{seed}"

# --- Lightning writes (relative to run_dir) ---
lightning:
  # ModelCheckpoint.dirpath pinned to {run_dir}/checkpoints in cli.py.
  # Decoupled from CSVLogger versioning — no version_N in checkpoint path.
  checkpoint: "checkpoints/best_model.ckpt"
  last_checkpoint: "checkpoints/last.ckpt"
  # CSVLogger still writes to lightning_logs/version_N/ — diagnostics only,
  # nothing depends on these paths.
  metrics: "lightning_logs/version_*/metrics.csv"
  hparams: "lightning_logs/version_*/hparams.yaml"
  config: "lightning_logs/version_*/config.yaml"

# --- Dagster orchestration ---
dagster:
  io_dir: "{lake_root}/.dagster/io"        # IOManager JSON sidecars
  complete_marker: ".complete"              # in run_dir, written after COMPLETED
  home: "/fs/scratch/PAS1266/dagster"       # DAGSTER_HOME (SQLite event log)

# --- SLURM ---
slurm:
  log_dir: "/fs/ess/PAS1266/kd-gat/slurm_logs"
  log_pattern: "{job_name}_%j.{out,err}"
  log_retention_days: 30

# --- Wandb ---
wandb:
  dir: "/fs/scratch/PAS1266/wandb"

# --- Preprocessing ---
preprocessing:
  cache: "{lake_root}/cache/v{preprocessing_version}/{dataset}"
  lock: "{cache_dir}/.lock"

# --- Data staging (per-job, ephemeral) ---
staging:
  scratch: "/fs/scratch/PAS1266/kd-gat-data"
  tmpdir: "$TMPDIR/kd-gat-data"
  marker: ".staged_marker"

# --- Analysis artifacts ---
analyzer:
  output_dir: null  # required CLI param, no default
