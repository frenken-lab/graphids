model:
  class_path: graphids.core.models.supervised.gat.GATModule
  init_args:
    conv_type: gatv2
    edge_dim: 11
    loss_fn: ce
    focal_gamma: 2.0
    loss_weight: 10.0
    pool_aggrs: [mean]
    compile_model: true
    auxiliaries: []

# GAT is compute-bound (cg_ratio ≈ 0.21 at W=6). 4 workers is sufficient —
# extra workers idle waiting for GPU. Overrides stage YAML's num_workers=6.
data:
  init_args:
    num_workers: 4
