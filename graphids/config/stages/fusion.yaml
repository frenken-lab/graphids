trainer:
  accelerator: cpu
  precision: 32
  max_epochs: 1500
  gradient_clip_val: null
  log_every_n_steps: 10
checkpoint:
  monitor: val_acc
  mode: max
early_stopping:
  monitor: val_acc
  mode: max
  patience: 200
data:
  class_path: graphids.core.preprocessing.datamodule.FusionDataModule
  init_args:
    max_samples: 150000
    max_val_samples: 30000
    eval_batch_size: 256
