# Fusion stage shared config. Depends on VGAE + GAT checkpoints.
# Method-specific model class_path layered via fusion_{method}.yaml.
# gradient_clip_val: null — DQN/Bandit use manual optimization,
# Lightning rejects gradient_clip_val with automatic_optimization=False.
trainer:
  precision: 32
  max_epochs: 50
  log_every_n_steps: 10
  gradient_clip_val: null
checkpoint:
  monitor: val_acc
  mode: max
early_stopping:
  monitor: val_acc
  mode: max
data:
  class_path: graphids.core.preprocessing.datamodule.FusionDataModule
