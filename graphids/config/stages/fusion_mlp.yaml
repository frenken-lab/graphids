# MLP fusion baseline. Depends on VGAE + GAT checkpoints.
trainer:
  precision: 32
  max_epochs: 50
  log_every_n_steps: 10
  callbacks:
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args: {monitor: val_acc, mode: max, save_top_k: 1, filename: "best_model"}
model:
  class_path: graphids.core.models.fusion_baselines.MLPFusionModule
data:
  class_path: graphids.core.preprocessing.datamodule.FusionDataModule
  init_args: {method: mlp}
