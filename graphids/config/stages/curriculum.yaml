# GAT supervised + curriculum learning. Depends on VGAE checkpoint.
# Usage: python -m graphids fit --config graphids/config/stages/curriculum.yaml
model:
  class_path: graphids.core.models.gat.GATModule
  init_args:
    fc_layers: 1
    proj_dim: 48
    pool_aggrs: ["mean"]
    auxiliaries: []
    compile_model: true
data:
  class_path: graphids.core.preprocessing.curriculum.CurriculumDataModule
  init_args: {batch_size: 8192, num_workers: 2}
trainer:
  callbacks:
    - class_path: graphids.core.preprocessing.curriculum.CurriculumEpochCallback
