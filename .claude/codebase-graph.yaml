edges:
  # ── Config internal ──────────────────────────────────────────────────
- from: config_init
  to: config_schema
  rel: imports
  notes: "re-exports PipelineConfig, all architecture types"
- from: config_init
  to: config_resolver
  rel: imports
  notes: "re-exports resolve()"
- from: config_init
  to: config_paths
  rel: imports
  notes: "re-exports checkpoint_path, config_path, stage_dir, etc."
- from: config_init
  to: config_constants
  rel: imports
  notes: "re-exports MLFLOW_TRACKING_URI, STAGES"
- from: config_init
  to: config_catalog
  rel: imports
  notes: "re-exports get_datasets, list_models, etc."
- from: config_resolver
  to: config_yamls
  rel: reads
  notes: "yaml.safe_load for defaults + model + aux YAML files"
- from: config_resolver
  to: config_schema
  rel: imports
  notes: "constructs PipelineConfig from merged dict"
- from: config_catalog
  to: config_yamls
  rel: reads
  notes: "reads datasets.yaml for validation"

  # ── CLI dispatch ─────────────────────────────────────────────────────
- from: cli
  to: config_init
  rel: imports
  notes: "PipelineConfig, MLFLOW_TRACKING_URI, config_path, run_id, stage_dir"
- from: cli
  to: config_resolver
  rel: imports
  notes: "lazy: resolve(), _deep_merge()"
- from: cli
  to: validate
  rel: imports
- from: cli
  to: stages_init
  rel: imports
  notes: "lazy: STAGE_FNS dispatch dict"
- from: cli
  to: ray_pipeline
  rel: imports
  notes: "lazy: eval_pipeline, train_pipeline"
- from: cli
  to: tune_config
  rel: imports
  notes: "lazy: _STAGE_MODEL, dry_run_tune, run_tune"
- from: cli
  to: sweep_pipeline
  rel: imports
  notes: "lazy: run_sweep_pipeline"
- from: cli
  to: mlflow_db
  rel: writes
  notes: "mlflow.start_run, log_params, log_metrics, log_artifact"
- from: cli
  to: frozen_configs
  rel: writes
  notes: "cfg.save(config_path)"

  # ── Stages __init__ dispatch ─────────────────────────────────────────
- from: stages_init
  to: training
  rel: imports
  notes: "train_autoencoder, train_curriculum, train_normal"
- from: stages_init
  to: fusion_stage
  rel: imports
  notes: "train_fusion"
- from: stages_init
  to: evaluation
  rel: imports
  notes: "evaluate"
- from: stages_init
  to: temporal_stage
  rel: imports
  notes: "train_temporal"

  # ── Training stage ───────────────────────────────────────────────────
- from: training
  to: config_init
  rel: imports
  notes: "PipelineConfig, checkpoint_path, config_path, stage_dir"
- from: training
  to: config_constants
  rel: imports
  notes: "get_batch_index"
- from: training
  to: batch_sizing
  rel: imports
  notes: "resolve_batch_config"
- from: training
  to: data_loading
  rel: imports
  notes: "training_preamble"
- from: training
  to: modules
  rel: imports
  notes: "VGAEModule, GATModule, CurriculumDataModule"
- from: training
  to: stage_utils
  rel: imports
  notes: "cleanup, graph_label, load_data, load_frozen_cfg, load_model, load_teacher, make_dataloader, make_projection, make_trainer"
- from: training
  to: registry
  rel: imports
  notes: "lazy: get() for model construction"
- from: training
  to: checkpoints
  rel: writes
  notes: "torch.save(model.state_dict(), ckpt)"
- from: training
  to: frozen_configs
  rel: writes
  notes: "cfg.save(config_path)"
- from: training
  to: metrics_json
  rel: writes
  notes: "json.dumps(metrics) -> write_text"

  # ── Evaluation stage ─────────────────────────────────────────────────
- from: evaluation
  to: config_init
  rel: imports
  notes: "PipelineConfig, cache_dir, data_dir, metrics_path, stage_dir"
