# Module summaries for graph-view navigation
# To refresh: ask Claude in an interactive session
modules:
  config:
    summary: >-
      Defines all pipeline configuration via Pydantic v2 frozen models and YAML composition.
      Resolution order: defaults.yaml -> model/{type}/{scale}.yaml -> auxiliaries -> CLI overrides.
      No imports from pipeline/ or core/ (enforced by tests). Consumed by every downstream layer
      as the single source of truth for hyperparameters, paths, constants, and dataset catalog.
  pipeline:
    entry_files:
      - graphids/pipeline/cli.py
      - graphids/pipeline/stages/training.py
      - graphids/pipeline/orchestration/ray_pipeline.py
      - graphids/pipeline/orchestration/driver.py
    summary: >-
      Orchestrates training, evaluation, and sweeps via subprocess dispatch for CUDA context
      isolation (~300-500 MB per model). CLI entry point dispatches to stage functions (training,
      fusion, evaluation, temporal) or to orchestration. Two orchestration systems: (1) Ray-based
      for interactive/local work (ray_pipeline.py), (2) scheduler-agnostic for production HPC
      (driver.py + planner.py + store.py + executor.py + job.py) supporting SLURM, Flux, and
      DryRun backends with SQLite state, UUID-based DAG, retry scaling, and fire-and-forget mode.
      Imports config/ at top level, core/ only lazily inside functions.
  core:
    summary: >-
      Domain layer containing model architectures (VGAE, GAT, DQN, Temporal), preprocessing
      (sliding-window graph construction from CAN bus CSVs via adapters), and data loading
      (PyG InMemoryDataset with versioned cache). Upstream: reads raw CSV data and config
      constants. Downstream: consumed by pipeline stages for training and evaluation.
      Never imports from pipeline/.
  tests:
    entry_files:
      - tests/conftest.py
      - tests/test_layer_boundaries.py
      - tests/test_training_e2e.py
    summary: >-
      Test suite with 10 test files covering layer boundary enforcement (AST-based import
      checks), preprocessing (adapters, engine, vocabulary), model registry, fusion extractors,
      FastAPI serving, training smoke tests, end-to-end stage contracts (VGAE->GAT->DQN->eval),
      pipeline integration, and new feature regression. Shared fixtures in conftest.py define
      tiny architectures and E2E_OVERRIDES. Must always run via SLURM, never on login nodes.
  slurm:
    entry_files:
      - scripts/slurm/_preamble.sh
      - scripts/slurm/ray_slurm.sbatch
      - scripts/slurm/run_tests_slurm.sh
    summary: >-
      SLURM job scripts for dispatching work to the cluster. All share _preamble.sh (module load,
      venv activate, source .env, stage data) and _epilog.sh (GPU report, sacct, HF push).
      Covers pipeline runs (ray_slurm.sbatch), sweeps (sweep_pipeline.sbatch, tune_sweep.sbatch), testing
      (run_tests_slurm.sh, run_tests_parallel.sh), smoke tests (gpudebug partition), cache
      rebuilds, loss landscape, and full reproduction. stage_data.sh handles 3-tier storage
      staging (shared -> scratch -> TMPDIR).
  tracking:
    entry_files:
      - scripts/data/push_experiments_to_hf.py
      - scripts/profiling/analyze_profile.py
    summary: >-
      Experiment tracking infrastructure: MLflow SQLite backend (mlflow.db) stores run metadata
      and metrics, with an artifact store directory for logged configs. push_experiments_to_hf.py
      exports MLflow runs as Parquet to HF Dataset for the consolidated dashboard. Also includes
      profiling scripts (analyze_profile.py for Chrome trace analysis, run_pygod_baselines.py
      for baseline comparisons).
  artifacts:
    entry_files:
      - docs/memory_optimization.md
    summary: >-
      Per-run persistent data stores and outputs. Includes preprocessed graph cache (.pt/.pkl
      with versioned metadata), sweep state (resumable JSON) and results (best-config YAML),
      model checkpoints (best_model.pt per stage), frozen configs, evaluation metrics, VGAE/GAT
      embeddings, attention weights, DQN fusion policy exports, and loss landscape Parquet files.
      All paths are parameterized by dataset, model type, scale, and stage.
  external:
    entry_files:
      - scripts/data/push_experiments_to_hf.py
    summary: >-
      External outputs: HF Datasets (kd-gat-experiments, kd-gat-sweeps) storing Parquet
      exports of MLflow runs and sweep results, plus the consolidated Streamlit dashboard
      on HF Spaces. Fed by epilog_sh auto-push after SLURM jobs. Raw CAN bus CSV data
      (DVC-tracked) also lives here as the ultimate upstream data source.
