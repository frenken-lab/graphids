site_name: GraphIDS
site_description: CAN bus intrusion detection via graph neural network knowledge distillation.
site_author: Robert Frenken
site_url: https://frenken-lab.github.io/graphids/

repo_name: frenken-lab/graphids
repo_url: https://github.com/frenken-lab/graphids
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2024-2026 Robert Frenken

# Top-level docs/README.md is a GitHub-only landing page; drafts/ is a
# scratchpad for in-flight docs. Both are excluded from the published
# site so `mkdocs build --strict` doesn't fail on them. The leading slash
# anchors the pattern (otherwise it would match e.g. decisions/README.md).
exclude_docs: |
  /README.md
  /drafts/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            # Static analysis via Griffe — never imports modules. Keeps
            # CI torchless and sidesteps import-time side effects.
            allow_inspection: false
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            docstring_style: google
            merge_init_into_class: true
            heading_level: 2

nav:
  - Home: index.md
  - Architecture:
      - Module responsibilities: responsibilities.md
      - Config system: reference/config-architecture.md
      - Data flow: reference/data-flow.md
      - Fusion state: reference/fusion-state.md
      - Orchestration: reference/orchestration.md
      - Observability: reference/observability.md
      - Write paths: reference/write-paths.md
      - Submit flow: reference/submit-flow.md
      - Prebatch timing: reference/prebatch-timing.md
      - PyTorch compat: reference/pytorch-compat.md
  - API Reference:
      - Orchestrate: api/orchestrate.md
      - CLI: api/cli.md
      - Callbacks: api/callbacks.md
      - Data: api/data.md
      - Models: api/models.md
      - Artifacts: api/artifacts.md
      - Config: api/config.md
      - SLURM: api/slurm.md
  - Decisions: decisions/README.md
