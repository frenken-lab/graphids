name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
      - "graphids/config/**"
      - "graphids/orchestrate/**"
      - "graphids/core/callbacks.py"
      - "graphids/_mlflow.py"
      - "graphids/core/data/vocab.py"
      - "graphids/core/data/sampler.py"
      - "graphids/core/data/budget.py"
      - "graphids/slurm/**"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
      - "graphids/config/**"
      - "graphids/orchestrate/**"
      - "graphids/core/callbacks.py"
      - "graphids/_mlflow.py"
      - "graphids/core/data/vocab.py"
      - "graphids/core/data/sampler.py"
      - "graphids/core/data/budget.py"
      - "graphids/slurm/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs deps
        run: pip install -r requirements-docs.txt
      - name: Build site
        # mkdocstrings uses static Griffe analysis (allow_inspection: false in
        # mkdocs.yml) — the package is never imported, so no torch/PyG in CI.
        run: mkdocs build --strict
      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
