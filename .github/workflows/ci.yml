name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "graphids/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check graphids/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric
          pip install fastapi httpx pydantic pyyaml numpy scikit-learn psutil mlflow pytorch-lightning pandas pyarrow pytest
          pip install -e ".[dev]" --no-deps
      - name: Run tests
        run: pytest tests/test_layer_boundaries.py tests/test_serve.py tests/test_registry.py tests/test_pipeline_integration.py tests/test_fusion_extractors.py -v -m "not slurm and not slow"
