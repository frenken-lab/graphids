name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "graphids/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check graphids/ tests/

