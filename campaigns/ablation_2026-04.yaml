# Ablation campaign — ported from the deleted configs/recipes/ablation.jsonnet
# (Session 45 Track 1, 2026-04-12). Claims map to paper sections:
#
#   Claim 4 — loss function × scale  (supervised stage)
#   Claim 2 — fusion method × scale  (full pipeline)
#   Claim 5 — conv type              (supervised stage, focal loss, small)
#   Claim 6 — unsupervised variants  (autoencoder only, small)
#
# Each cell is a sparse override on `defaults`. Manually listed (no
# cartesian expansion) so the rendered plan is grep-able and diffable.
# To run the next pending cell: `graphids campaign next campaigns/ablation_2026-04.yaml`
version: 1
name: ablation_2026-04
description: "Claim-4 loss × claim-2 fusion × claim-5 conv × claim-6 unsupervised"
created: 2026-04-12

defaults:
  dataset: hcrl_sa
  seed: 42
  stages: [autoencoder, supervised, fusion]
  scale: small
  conv_type: gatv2
  variational: true
  loss_fn: focal
  fusion_method: bandit

cells:
  # --- Claim 4 — loss function × scale (autoencoder+supervised only) ---
  - { id: c4-sup-ce-small,          stages: [autoencoder, supervised], loss_fn: ce }
  - { id: c4-sup-focal-small,       stages: [autoencoder, supervised], loss_fn: focal }
  - { id: c4-sup-weighted_ce-small, stages: [autoencoder, supervised], loss_fn: weighted_ce }
  - { id: c4-sup-ce-large,          stages: [autoencoder, supervised], scale: large, loss_fn: ce }
  - { id: c4-sup-focal-large,       stages: [autoencoder, supervised], scale: large, loss_fn: focal }
  - { id: c4-sup-weighted_ce-large, stages: [autoencoder, supervised], scale: large, loss_fn: weighted_ce }

  # --- Claim 2 — fusion method × scale (full pipeline) ---
  - { id: c2-fusion-bandit-small,       fusion_method: bandit }
  - { id: c2-fusion-dqn-small,          fusion_method: dqn }
  - { id: c2-fusion-mlp-small,          fusion_method: mlp }
  - { id: c2-fusion-weighted_avg-small, fusion_method: weighted_avg }
  - { id: c2-fusion-bandit-large,       scale: large, fusion_method: bandit }
  - { id: c2-fusion-dqn-large,          scale: large, fusion_method: dqn }
  - { id: c2-fusion-mlp-large,          scale: large, fusion_method: mlp }
  - { id: c2-fusion-weighted_avg-large, scale: large, fusion_method: weighted_avg }

  # --- Claim 5 — conv type (supervised, focal, small) ---
  - { id: c5-conv-gat,  stages: [autoencoder, supervised], conv_type: gat }
  - { id: c5-conv-gps,  stages: [autoencoder, supervised], conv_type: gps }

  # --- Claim 6 — unsupervised variants (autoencoder only, small) ---
  # VGAE is the default (variational: true); GAE is variational: false.
  # DGI-as-separate-model_type was in the original recipe comment but not
  # wired in the jsonnet expansion — deferred until model_type becomes a
  # manifest field (tla_overrides can carry it today if needed).
  - { id: c6-unsup-vgae, stages: [autoencoder], variational: true }
  - { id: c6-unsup-gae,  stages: [autoencoder], variational: false }
