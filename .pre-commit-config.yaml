repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        # mkdocs.yml uses ``!!python/name:`` tags that the standard SafeLoader
        # rejects; mkdocs has its own loader. ``--unsafe`` opts into the
        # FullLoader for syntax checking only.
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-added-large-files
        args: [--maxkb=500]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^(\.venv/|uv\.lock$|tests/fixtures/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^graphids/config/
        additional_dependencies: [pydantic>=2.10]
        args: [--config-file=pyproject.toml]
  - repo: local
    hooks:
      - id: lint-docs
        name: lint mkdocs site (Griffe symbol resolution + nav symmetry)
        entry: python scripts/lint_docs.py
        language: python
        additional_dependencies: [griffe>=2.0, pyyaml>=6.0]
        files: ^(docs/.*\.md|mkdocs\.yml|graphids/.*\.py|scripts/lint_docs\.py)$
        pass_filenames: false
