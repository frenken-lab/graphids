# Profile config: 5-epoch training run with Lightning profiler + DeviceStatsMonitor.
#
# Orchestrator metadata (in YAML comments — LightningCLI rejects unknown keys):
# meta: {model_type: vgae, scale: medium, stage: autoencoder}
#
# Measures DataLoader bottleneck, GPU utilization, and memory per step.
# Override model/data/workers via CLI:
#
#   python -m graphids fit --config configs/profile.yaml \
#     --data.dataset=set_02 --data.num_workers=3
#
# Output: profiler summary in stdout, DeviceStatsMonitor in TensorBoard logs.

seed_everything: 42

model:
  class_path: graphids.core.models.vgae.VGAEModule
  init_args:
    training:
      lr: 0.001
      weight_decay: 1.0e-5
      max_epochs: 5
    vgae:
      conv_type: gatv2

data:
  class_path: graphids.core.preprocessing.datamodule.CANBusDataModule
  init_args:
    dataset: hcrl_ch
    batch_size: 8192
    num_workers: 2
    dynamic_batching: true
    conv_type: gatv2
    heads: 4

trainer:
  max_epochs: 5
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  log_every_n_steps: 1
  enable_progress_bar: true
  default_root_dir: experimentruns/profiles
  profiler: simple
  callbacks:
    - class_path: pytorch_lightning.callbacks.DeviceStatsMonitor
      init_args:
        cpu_stats: true
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        monitor: val_loss
        save_top_k: 0
        save_last: false
  plugins:
    - class_path: pytorch_lightning.plugins.environments.SLURMEnvironment
      init_args:
        auto_requeue: false
