# Per-group result views for `graphids exp results`.
#
# Each entry declares (a) base graphids-tag filter, (b) ordered metric keys
# to print. CLI flags compose with the base filter (CLI overrides win).
#
# Adding a new model group: copy a block, edit `filter.group` to match what
# `meta.group` is set to in the plan module, edit `metrics` to match what
# the model's test_step actually logs.
#
# To inspect what keys a run actually has:
#     graphids exp results --view <name> --format json | jq '.[0]'

# Catch-all: no group filter, all phases, classifier-flavor metric defaults.
# Override --group, --variant, --phase from the CLI to scope.
any:
  filter:
    phase: test
  metrics:
    - test/test/auroc_macro
    - test/test/mcc
    - test/test/f1_per_class/attack
