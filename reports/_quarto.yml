project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "paper/paper.qmd"
    - "!paper/[0-9]*.qmd"
    - "!paper/index.qmd"
    - "!paper/_setup.qmd"
    - "!pipeline_report.qmd"
    - "!workflow.rst"
  resources:
    - "data/**"
    - "paper/data/**"
    - "paper/figures/**"

website:
  title: "KD-GAT"
  navbar:
    left:
      - text: "Dashboard"
        href: dashboard.qmd
      - text: "Paper"
        href: paper/paper.qmd
      - text: "Slides"
        href: slides.qmd
      - text: "Playground"
        href: playground.qmd
    right:
      - icon: github
        href: https://github.com/buckeyeguy/KD-GAT

bibliography: references.bib

brand: _brand.yml

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    code-fold: true
    fig-responsive: true
    reference-location: margin
  typst:
    documentclass: article
    papersize: us-letter
    margin:
      x: 1in
      y: 1in
    columns: 1
    toc: true
  revealjs:
    theme: dark
    width: 1600
    height: 900
    slide-number: true
    code-fold: true
