data:
  runs_by_dataset:
    query: >
      SELECT dataset, model_type, COUNT(*) AS n
      FROM runs
      GROUP BY dataset, model_type
      ORDER BY dataset, model_type
plot:
  - mark: barX
    data: { from: runs_by_dataset }
    y: dataset
    x: n
    fill: model_type
    sort: { y: "-x" }
  - mark: ruleX
    data: [0]
  - legend: color
width: 500
height: 320
marginLeft: 60
_palette: model-4
xLabel: Number of Runs
yLabel: null
