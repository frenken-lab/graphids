data:
  metrics:
    file: data/metrics.parquet
plot:
  - mark: dot
    data: { from: metrics }
    x: auc
    y: f1
    fill: model
    stroke: model
    r: 6
    opacity: 0.7
  - legend: color
width: 500
height: 320
_palette: model-3
xLabel: AUC
xDomain: [0.8, 1.01]
yLabel: F1 Score
yDomain: [0.5, 1.01]
