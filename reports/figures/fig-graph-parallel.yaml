data:
  graph_stats:
    file: data/graph_statistics.parquet
params:
  sel: { select: single }
vconcat:
  - input: menu
    from: graph_stats
    column: dataset
    label: Dataset
    as: $sel
  - plot:
      - mark: dotX
        data: { from: graph_stats, filterBy: $sel }
        x: density
        y: attack_type_name
        fill: attack_type_name
        r: 3
    width: 900
    height: 400
    colorScheme: tableau10
    xLabel: Graph Density (by dataset)
    yLabel: null
    marginLeft: 120
