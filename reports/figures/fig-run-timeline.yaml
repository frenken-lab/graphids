data:
  run_timeline:
    query: >
      SELECT run_id, model_type, stage, started_at, completed_at
      FROM runs
      WHERE started_at IS NOT NULL AND completed_at IS NOT NULL
      ORDER BY started_at
plot:
  - mark: barX
    data: { from: run_timeline }
    y: run_id
    x1: started_at
    x2: completed_at
    fill: model_type
    sort: { y: x1 }
  - legend: color
width: 900
height: 400
marginLeft: 220
_palette: model-4
xLabel: Time
yLabel: null
