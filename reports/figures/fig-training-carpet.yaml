data:
  training_curves:
    file: data/training_curves.parquet
params:
  sel: { select: single }
vconcat:
  - input: menu
    from: training_curves
    column: run_id
    label: Run
    as: $sel
  - plot:
      - mark: cell
        data: { from: training_curves, filterBy: $sel }
        x: epoch
        y: metric_name
        fill: value
        inset: 0.5
      - legend: color
    width: 900
    height: 200
    colorScheme: viridis
    colorLabel: Value
    xLabel: Epoch
    yLabel: null
