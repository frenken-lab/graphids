data:
  feature_heatmap:
    query: >
      SELECT attack_type_name,
        AVG(density) AS density,
        AVG(avg_degree) AS avg_degree,
        AVG(clustering_coeff) AS clustering,
        AVG(degree_std) AS degree_std,
        AVG(betweenness_centrality_mean) AS bc_mean,
        AVG(degree_assortativity) AS assortativity,
        AVG(attack_node_ratio) AS attack_ratio
      FROM graph_stats
      GROUP BY attack_type_name
  feature_long:
    query: >
      SELECT attack_type_name, feature, value
      FROM (
        SELECT attack_type_name, 'density' AS feature, density AS value FROM feature_heatmap
        UNION ALL
        SELECT attack_type_name, 'avg_degree', avg_degree FROM feature_heatmap
        UNION ALL
        SELECT attack_type_name, 'clustering', clustering FROM feature_heatmap
        UNION ALL
        SELECT attack_type_name, 'degree_std', degree_std FROM feature_heatmap
        UNION ALL
        SELECT attack_type_name, 'bc_mean', bc_mean FROM feature_heatmap
        UNION ALL
        SELECT attack_type_name, 'assortativity', assortativity FROM feature_heatmap
        UNION ALL
        SELECT attack_type_name, 'attack_ratio', attack_ratio FROM feature_heatmap
      )
plot:
  - mark: cell
    data: { from: feature_long }
    x: feature
    y: attack_type_name
    fill: value
    inset: 1
  - legend: color
width: 680
height: 350
colorScheme: viridis
colorLabel: Value (mean)
xLabel: Feature
yLabel: Attack Type
xTickRotate: -30
marginLeft: 120
