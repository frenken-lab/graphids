data:
  bubble_data:
    query: >
      SELECT m.dataset, m.model, m.f1, m.accuracy, m.auc,
             COALESCE(s.param_count_M, 0.1) AS param_count_M
      FROM metrics m
      LEFT JOIN model_sizes s ON m.model = s.model_type
      WHERE m.f1 IS NOT NULL AND m.accuracy IS NOT NULL
plot:
  - mark: dot
    data: { from: bubble_data }
    x: f1
    y: accuracy
    fill: model
    stroke: model
    r: param_count_M
    opacity: 0.6
  - legend: color
width: 680
height: 400
_palette: model-3
rRange: [4, 30]
xLabel: F1 Score
xDomain: [0.4, 1.01]
yLabel: Accuracy
yDomain: [0.4, 1.01]
