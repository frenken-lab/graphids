data:
  cka_similarity:
    file: data/cka_similarity.parquet
params:
  sel: { select: single }
vconcat:
  - input: menu
    from: cka_similarity
    column: run_id
    label: Run
    as: $sel
  - plot:
      - mark: cell
        data: { from: cka_similarity, filterBy: $sel }
        x: student_layer
        y: teacher_layer
        fill: similarity
        inset: 0.5
      - legend: color
    width: 400
    height: 300
    colorScheme: viridis
    colorLabel: CKA Similarity
    xLabel: Student Layer
    yLabel: Teacher Layer
