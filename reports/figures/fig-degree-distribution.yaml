data:
  graph_stats:
    file: data/graph_statistics.parquet
plot:
  - mark: rectY
    data: { from: graph_stats }
    x: { bin: avg_degree }
    y: { count: true }
    fill: { sql: "CASE WHEN label = 0 THEN 'normal' ELSE 'attack' END" }
    insetLeft: 0.5
    insetRight: 0.5
  - legend: color
width: 900
height: 350
_palette: binary-label
xLabel: Average Degree
yLabel: Count
