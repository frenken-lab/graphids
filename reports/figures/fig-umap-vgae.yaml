data:
  embeddings:
    file: data/embeddings.parquet
params:
  sel: { select: single }
vconcat:
  - input: menu
    from: embeddings
    column: run_id
    label: Run
    as: $sel
  - plot:
      - mark: dot
        data: { from: embeddings, filterBy: $sel }
        x: x
        y: y
        fill: { sql: "CASE WHEN label = 0 THEN 'normal' ELSE 'attack' END" }
        r: 2
        opacity: 0.5
      - legend: color
    width: 600
    height: 350
    _palette: binary-label
    xLabel: UMAP 1
    yLabel: UMAP 2
    xAxis: null
    yAxis: null
