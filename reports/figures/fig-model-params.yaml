data:
  model_params:
    query: >
      SELECT *, model_type || ' (' || scale || ')' AS label
      FROM model_sizes
plot:
  - mark: barX
    data: { from: model_params }
    y: label
    x: param_count_M
    fill: scale
    sort: { y: "-x" }
  - mark: text
    data: { from: model_params }
    y: label
    x: param_count_M
    text: { sql: "param_count_M || 'M'" }
    dx: 5
    textAnchor: start
    fontSize: 11
  - mark: ruleX
    data: [0]
width: 400
height: 260
marginLeft: 120
_palette: scale
xLabel: Parameters (millions)
yLabel: null
