data:
  graph_stats:
    file: data/graph_statistics.parquet
params:
  sel: { select: single }
vconcat:
  - input: menu
    from: graph_stats
    column: dataset
    label: Dataset
    as: $sel
  - plot:
      - mark: dotX
        data: { from: graph_stats, filterBy: $sel }
        x: avg_degree
        y: attack_type_name
        fill: density
        r: { sql: "num_nodes / 5.0" }
        opacity: 0.7
      - legend: color
    width: 680
    height: 350
    colorScheme: viridis
    colorLabel: Density
    xLabel: Average Degree
    yLabel: Attack Type
    marginLeft: 120
