data:
  loss_landscape:
    file: data/loss_landscape.parquet
params:
  sel: { select: crossfilter }
vconcat:
  - input: menu
    from: loss_landscape
    column: model_type
    label: Model
    as: $sel
  - input: menu
    from: loss_landscape
    column: dataset
    label: Dataset
    as: $sel
  - plot:
      - mark: rect
        data: { from: loss_landscape, filterBy: $sel }
        x: x
        y: y
        fill: loss
        inset: 0.5
    width: 500
    height: 400
    colorScheme: viridis
    colorLabel: Loss
    xLabel: Direction 1
    yLabel: Direction 2
